# OpenClaw DNS outbound filter
# Allowlist mode: only listed domains resolve. Everything else → NXDOMAIN.
# Edit this file and restart openclaw-dns container to update the allowlist.
#
# To add a domain:  server=/newdomain.com/8.8.8.8
# To remove:        delete or comment out the line
# Wildcards:        server=/domain.com/8.8.8.8 also covers sub.domain.com

no-resolv
log-queries
log-facility=-

# ── OUTBOUND ALLOWLIST ────────────────────────────────────────────────────────

# OpenAI (AI model API + OAuth via chatgpt.com)
server=/openai.com/8.8.8.8
server=/chatgpt.com/8.8.8.8

# Signal infrastructure
server=/signal.org/8.8.8.8
server=/whispersystems.org/8.8.8.8

# AWS S3 + CloudFront (Signal uses for media/attachments)
server=/amazonaws.com/8.8.8.8
server=/cloudfront.net/8.8.8.8

# OpenClaw updates
server=/openclaw.ai/8.8.8.8

# ── BLOCK EVERYTHING ELSE ────────────────────────────────────────────────────
# Queries not matching any server= rule above return NXDOMAIN.
# These are logged as: config DOMAIN is NXDOMAIN
# The monitor script watches for those lines and sends you a Signal alert.
address=/#/
