name: QA Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Lint Python files
        run: ruff check apps/ tests/ deploy/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest pytest-cov pyyaml numpy Pillow opencv-python-headless aiohttp pytest-aiohttp
      - name: Run tests
        run: pytest tests/ -v --tb=short || [ $? -eq 5 ]

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint shell scripts
        run: |
          find scripts/ deploy/ -name '*.sh' -exec shellcheck --severity=warning {} +
