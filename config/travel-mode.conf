# travel-mode.conf — Travel mode configuration
#
# Home network SSIDs (comma-separated, case-sensitive)
# When connected to any of these, travel mode is OFF (all skills enabled)
HOME_SSIDS="HOME-515B-2.4,HOME-515B-5"

# Skills that are ALWAYS enabled regardless of network
# These are safe to use on any network
SAFE_SKILLS="robot-control,companion,reminders,travel-unlock"

# Skills that are DISABLED in travel mode (sensitive data)
# These require PIN unlock on unknown networks
SENSITIVE_SKILLS="monarch-money,chatgpt,fitness,meeting-notes"

# PIN lockout settings
MAX_PIN_ATTEMPTS=3
LOCKOUT_SECONDS=900

# State files (under ~/.openclaw/secrets/)
SECRETS_DIR="${HOME}/.openclaw/secrets"
PIN_HASH_FILE="${SECRETS_DIR}/travel-pin.hash"
LOCKOUT_FILE="${SECRETS_DIR}/travel-lockout.json"
SESSION_FILE="${SECRETS_DIR}/travel-session.json"
